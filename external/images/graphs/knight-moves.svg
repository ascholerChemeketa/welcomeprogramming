<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520" viewBox="0 0 520 520">
  <defs>
    <style>
      .title { font: 18px sans-serif; font-weight: 700; fill: #111; }
      .label { font: 12px sans-serif; fill: #333; }
      .cell { stroke: #111; stroke-width: 2; }
      .text { font: 22px sans-serif; font-weight: 700; fill: #111; dominant-baseline: middle; text-anchor: middle; }
      .move { font: 22px sans-serif; font-weight: 700; fill: #111; dominant-baseline: middle; text-anchor: middle; }
    </style>
  </defs>

  <!-- Title -->
  <text x="20" y="28" class="title">Knight moves from (row 2, col 3)</text>

  <!-- board origin (x0,y0) = (40, 50), cell = 55 -->

  <!-- Column labels: 0..7 -->
  <g class="label">
    <text x="67.5"  y="45" text-anchor="middle">0</text>
    <text x="122.5" y="45" text-anchor="middle">1</text>
    <text x="177.5" y="45" text-anchor="middle">2</text>
    <text x="232.5" y="45" text-anchor="middle">3</text>
    <text x="287.5" y="45" text-anchor="middle">4</text>
    <text x="342.5" y="45" text-anchor="middle">5</text>
    <text x="397.5" y="45" text-anchor="middle">6</text>
    <text x="452.5" y="45" text-anchor="middle">7</text>
  </g>

  <!-- Row labels: 0..7 -->
  <g class="label">
    <text x="30" y="77.5"  dominant-baseline="middle" text-anchor="middle">0</text>
    <text x="30" y="132.5" dominant-baseline="middle" text-anchor="middle">1</text>
    <text x="30" y="187.5" dominant-baseline="middle" text-anchor="middle">2</text>
    <text x="30" y="242.5" dominant-baseline="middle" text-anchor="middle">3</text>
    <text x="30" y="297.5" dominant-baseline="middle" text-anchor="middle">4</text>
    <text x="30" y="352.5" dominant-baseline="middle" text-anchor="middle">5</text>
    <text x="30" y="407.5" dominant-baseline="middle" text-anchor="middle">6</text>
    <text x="30" y="462.5" dominant-baseline="middle" text-anchor="middle">7</text>
  </g>

  <!-- Board (same checker pattern) -->
  <g>
    <!-- rows 0..7 -->
    <!-- row 0 -->
    <rect x="40"  y="50"  width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="95"  y="50"  width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="150" y="50"  width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="205" y="50"  width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="260" y="50"  width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="315" y="50"  width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="370" y="50"  width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="425" y="50"  width="55" height="55" class="cell" fill="#e6e6e6"/>

    <!-- row 1 -->
    <rect x="40"  y="105" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="95"  y="105" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="150" y="105" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="205" y="105" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="260" y="105" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="315" y="105" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="370" y="105" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="425" y="105" width="55" height="55" class="cell" fill="#f7f7f7"/>

    <!-- row 2 -->
    <rect x="40"  y="160" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="95"  y="160" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="150" y="160" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="205" y="160" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="260" y="160" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="315" y="160" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="370" y="160" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="425" y="160" width="55" height="55" class="cell" fill="#e6e6e6"/>

    <!-- row 3 -->
    <rect x="40"  y="215" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="95"  y="215" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="150" y="215" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="205" y="215" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="260" y="215" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="315" y="215" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="370" y="215" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="425" y="215" width="55" height="55" class="cell" fill="#f7f7f7"/>

    <!-- row 4 -->
    <rect x="40"  y="270" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="95"  y="270" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="150" y="270" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="205" y="270" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="260" y="270" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="315" y="270" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="370" y="270" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="425" y="270" width="55" height="55" class="cell" fill="#e6e6e6"/>

    <!-- row 5 -->
    <rect x="40"  y="325" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="95"  y="325" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="150" y="325" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="205" y="325" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="260" y="325" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="315" y="325" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="370" y="325" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="425" y="325" width="55" height="55" class="cell" fill="#f7f7f7"/>

    <!-- row 6 -->
    <rect x="40"  y="380" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="95"  y="380" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="150" y="380" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="205" y="380" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="260" y="380" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="315" y="380" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="370" y="380" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="425" y="380" width="55" height="55" class="cell" fill="#e6e6e6"/>

    <!-- row 7 -->
    <rect x="40"  y="435" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="95"  y="435" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="150" y="435" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="205" y="435" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="260" y="435" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="315" y="435" width="55" height="55" class="cell" fill="#f7f7f7"/>
    <rect x="370" y="435" width="55" height="55" class="cell" fill="#e6e6e6"/>
    <rect x="425" y="435" width="55" height="55" class="cell" fill="#f7f7f7"/>
  </g>

  <!-- Start square: (row 2, col 3) -->
  <!-- x = 40 + 3*55 = 205, y = 50 + 2*55 = 160 -->
  <rect x="210" y="165" width="45" height="45" fill="none" stroke="#111" stroke-width="4"/>
  <text x="232.5" y="187.5" class="text">K</text>

  <!-- Knight moves from (2,3) -->
  <!-- (0,2) (0,4) (1,1) (1,5) (3,1) (3,5) (4,2) (4,4) -->

  <!-- row 0 -->
  <text x="177.5" y="77.5"  class="move">•</text>  <!-- (0,2) -->
  <text x="287.5" y="77.5"  class="move">•</text>  <!-- (0,4) -->

  <!-- row 1 -->
  <text x="122.5" y="132.5" class="move">•</text>  <!-- (1,1) -->
  <text x="342.5" y="132.5" class="move">•</text>  <!-- (1,5) -->

  <!-- row 3 -->
  <text x="122.5" y="242.5" class="move">•</text>  <!-- (3,1) -->
  <text x="342.5" y="242.5" class="move">•</text>  <!-- (3,5) -->

  <!-- row 4 -->
  <text x="177.5" y="297.5" class="move">•</text>  <!-- (4,2) -->
  <text x="287.5" y="297.5" class="move">•</text>  <!-- (4,4) -->

  <!-- Legend -->
  <g transform="translate(40, 505)">
    <text class="label" x="0" y="0">Legend: K = knight start, • = possible move</text>
  </g>
</svg>
