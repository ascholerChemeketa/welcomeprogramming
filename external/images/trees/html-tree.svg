<svg xmlns="http://www.w3.org/2000/svg" width="850" height="440" viewBox="50 10 900 450" role="img" aria-label="Simple HTML structure shown as a tree: html with head and body; head has title, meta, link, script; body has header, main with section and article, and footer.">
  <defs>
    <style>
      .node { fill: #ffffff; stroke: #111111; stroke-width: 2; rx: 10; ry: 10; }
      .label { font: 16px sans-serif; fill: #111111; font-weight: 600; }
      .line { stroke: #111111; stroke-width: 2; }
      .small { font: 14px sans-serif; fill: #111111; }
      .root { fill:#E5DEE7; stroke:#111; stroke-width:2; rx:10; ry:10;}
      .head { fill: #CDE7FF; }
      .head-child { fill: #E7F2FF; }
      .body { fill: #FCD5CE; }
      .body-child { fill: #FDE5DF; }
      .body-child-2 { fill: #FEF1EE; }
      .body-child-3 { fill: #FFF7F5; }
    </style>
  </defs>

  <!-- Nodes -->
  <!-- Level 0 -->
  <rect class="root" x="400" y="20" width="100" height="44" />
  <text class="small" x="450" y="48" text-anchor="middle">&lt;html&gt;</text>

  <!-- Level 1 -->
  <rect class="node head" x="200" y="110" width="120" height="44" />
  <text class="small" x="260" y="138" text-anchor="middle">&lt;head&gt;</text>

  <rect class="node body" x="580" y="110" width="120" height="44" />
  <text class="small" x="640" y="138" text-anchor="middle">&lt;body&gt;</text>

  <!-- Level 2: head children -->
  <rect class="node head-child" x="80" y="200" width="110" height="44" />
  <text class="small" x="135" y="228" text-anchor="middle">&lt;title&gt;</text>

  <rect class="node head-child" x="210" y="200" width="110" height="44" />
  <text class="small" x="265" y="228" text-anchor="middle">&lt;meta&gt;</text>

  <rect class="node head-child" x="340" y="200" width="110" height="44" />
  <text class="small" x="395" y="228" text-anchor="middle">&lt;script&gt;</text>

  <!-- Level 2: body children -->
  <rect class="node body-child" x="520" y="200" width="120" height="44" />
  <text class="small" x="580" y="228" text-anchor="middle">&lt;header&gt;</text>

  <rect class="node body-child" x="660" y="200" width="120" height="44" />
  <text class="small" x="720" y="228" text-anchor="middle">&lt;main&gt;</text>

  <rect class="node body-child" x="800" y="200" width="120" height="44" />
  <text class="small" x="860" y="228" text-anchor="middle">&lt;footer&gt;</text>

  <!-- Level 3: nested inside main -->
  <rect class="node body-child-2" x="450" y="300" width="140" height="44" />
  <text class="small" x="520" y="328" text-anchor="middle">&lt;h1&gt;</text>

  <rect class="node body-child-2" x="610" y="300" width="140" height="44" />
  <text class="small" x="680" y="328" text-anchor="middle">&lt;section&gt;</text>

  <rect class="node body-child-2" x="770" y="300" width="140" height="44" />
  <text class="small" x="840" y="328" text-anchor="middle">&lt;article&gt;</text>

  <!-- Level 4: nested inside section and article -->
  <rect class="node body-child-3" x="580" y="400" width="100" height="44" />
  <text class="small" x="630" y="428" text-anchor="middle">&lt;h2&gt;</text>

  <rect class="node body-child-3" x="690" y="400" width="100" height="44" />
  <text class="small" x="740" y="428" text-anchor="middle">&lt;p&gt;</text>

  <rect class="node body-child-3" x="800" y="400" width="100" height="44" />
  <text class="small" x="850" y="428" text-anchor="middle">&lt;p&gt;</text>

  <!-- Lines -->
  <!-- html to head/body -->
  <line class="line" x1="450" y1="64" x2="260" y2="110" />
  <line class="line" x1="450" y1="64" x2="640" y2="110" />

  <!-- head to its children -->
  <line class="line" x1="260" y1="154" x2="135" y2="200" />
  <line class="line" x1="260" y1="154" x2="265" y2="200" />
  <line class="line" x1="260" y1="154" x2="395" y2="200" />

  <!-- body to its children -->
  <line class="line" x1="640" y1="154" x2="580" y2="200" />
  <line class="line" x1="640" y1="154" x2="720" y2="200" />
  <line class="line" x1="640" y1="154" x2="860" y2="200" />

  <!-- main to section/article -->
  <line class="line" x1="720" y1="244" x2="520" y2="300" />
  <line class="line" x1="720" y1="244" x2="680" y2="300" />
  <line class="line" x1="720" y1="244" x2="840" y2="300" />

  <!-- section to h2/p -->
  <line class="line" x1="680" y1="344" x2="630" y2="400" />
  <line class="line" x1="680" y1="344" x2="740" y2="400" />

  <!-- article to p -->
  <line class="line" x1="840" y1="344" x2="850" y2="400" />
</svg>
