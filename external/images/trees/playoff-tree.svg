<svg xmlns="http://www.w3.org/2000/svg" width="980" height="570" viewBox="0 0 980 570" role="img"
     aria-label="Simple NBA playoff bracket: 8 teams converge to one champion.">
  <defs>
    <style>
      .node { fill:#fff; stroke:#111; stroke-width:2; rx:10; ry:10; }
      .node-team { fill:#D4E1F5; stroke:#111; stroke-width:2; rx:10; ry:10; }
      .team { font: 14px sans-serif; fill:#111; font-weight:600; }
      .round { font: 16px sans-serif; fill:#111; font-weight:700; }
      .line { stroke:#111; stroke-width:2; fill:none; }
      .root { fill:#E1F5D4; stroke:#111; stroke-width:2; rx:10; ry:10;}
    </style>
  </defs>

  <!-- Round labels -->
  <text class="round" x="110" y="40" text-anchor="middle">Round 1</text>
  <text class="round" x="360" y="40" text-anchor="middle">Round 2</text>
  <text class="round" x="610" y="40" text-anchor="middle">Final</text>
  <text class="round" x="860" y="40" text-anchor="middle">Champion</text>

  <!-- Column X positions -->
  <!-- Teams: x=20, R2: x=270, Final: x=520, Champ: x=770 -->
  <!-- Box size -->
  <!-- width=160 height=34 -->

  <!-- 8 Teams (Round 1) -->
  <rect class="node-team" x="20" y="80"  width="160" height="34"/><text class="team" x="100" y="102" text-anchor="middle">Celtics</text>
  <rect class="node-team" x="20" y="130" width="160" height="34"/><text class="team" x="100" y="152" text-anchor="middle">Knicks</text>

  <rect class="node-team" x="20" y="210" width="160" height="34"/><text class="team" x="100" y="232" text-anchor="middle">Bucks</text>
  <rect class="node-team" x="20" y="260" width="160" height="34"/><text class="team" x="100" y="282" text-anchor="middle">Cavaliers</text>

  <rect class="node-team" x="20" y="340" width="160" height="34"/><text class="team" x="100" y="362" text-anchor="middle">Nuggets</text>
  <rect class="node-team" x="20" y="390" width="160" height="34"/><text class="team" x="100" y="412" text-anchor="middle">Lakers</text>

  <rect class="node-team" x="20" y="470" width="160" height="34"/><text class="team" x="100" y="492" text-anchor="middle">Warriors</text>
  <rect class="node-team" x="20" y="520" width="160" height="34"/><text class="team" x="100" y="542" text-anchor="middle">Suns</text>
  <!-- Hide the earlier Nuggets/Lakers/Warriors boxes that were too low by overlaying? (No: we won't add extras.) -->
  <!-- (We already placed Nuggets/Lakers at 340/390; Warriors/Suns at 430/480.) -->

  <!-- Round 2 winners (4) -->
  <rect class="node" x="270" y="105" width="160" height="34"/><text class="team" x="350" y="127" text-anchor="middle">Winner 1</text>
  <rect class="node" x="270" y="235" width="160" height="34"/><text class="team" x="350" y="257" text-anchor="middle">Winner 2</text>
  <rect class="node" x="270" y="365" width="160" height="34"/><text class="team" x="350" y="387" text-anchor="middle">Winner 3</text>
  <rect class="node" x="270" y="495" width="160" height="34"/><text class="team" x="350" y="517" text-anchor="middle">Winner 4</text>

  <!-- Finalists (2) -->
  <rect class="node" x="520" y="170" width="160" height="34"/><text class="team" x="600" y="192" text-anchor="middle">Winner 5</text>
  <rect class="node" x="520" y="420" width="160" height="34"/><text class="team" x="600" y="442" text-anchor="middle">Winner 6</text>

  <!-- Champion (1) -->
  <rect class="root" x="770" y="295" width="160" height="34"/><text class="team" x="850" y="317" text-anchor="middle">Champion</text>

  <!-- Connectors: Round 1 -> Round 2 -->
  <!-- Match 1: Celtics vs Knicks -> Winner 1 -->
  <path class="line" d="M180 97 H225 V122 H270"/>
  <path class="line" d="M180 147 H225 V122 H270"/>

  <!-- Match 2: Bucks vs Cavaliers -> Winner 2 -->
  <path class="line" d="M180 227 H225 V252 H270"/>
  <path class="line" d="M180 277 H225 V252 H270"/>

  <!-- Match 3: Nuggets vs Lakers -> Winner 3 -->
  <path class="line" d="M180 357 H225 V382 H270"/>
  <path class="line" d="M180 407 H225 V382 H270"/>

  <!-- Match 4: Warriors vs Suns -> Winner 4 -->
  <path class="line" d="M180 487 H225 V512 H270"/>
  <path class="line" d="M180 537 H225 V512 H270"/>

  <!-- Connectors: Round 2 -> Final -->
  <path class="line" d="M430 122 H475 V187 H520"/>
  <path class="line" d="M430 252 H475 V187 H520"/>

  <path class="line" d="M430 382 H475 V437 H520"/>
  <path class="line" d="M430 512 H475 V437 H520"/>

  <!-- Connectors: Final -> Champion -->
  <path class="line" d="M680 187 H725 V312 H770"/>
  <path class="line" d="M680 437 H725 V312 H770"/>
</svg>
